version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - API_URL=http://api:3001
      - MONGODB_URI=${MONGODB_URI}
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_TMDB_KEY=${TMDB_API_KEY}
    depends_on:
      - api
    restart: unless-stopped
